name: Build FullScreenExperienceShell

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore FullScreenExperienceShell.slnx

    - name: Build project
      # 这里添加了 -p:PublishReadyToRun=false 来绕过之前的发布优化报错
      # 并指定构建核心项目，确保环境一致性
      run: |
        dotnet build FullScreenExperienceShell.slnx \
          --configuration Release \
          -p:PublishReadyToRun=false \
          --no-restore

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FullScreenExperienceShell-Binaries
        # 该路径会自动搜索构建出的 exe 或其他二进制文件
        path: |
          **/bin/Release/net*/*.exe
          **/bin/Release/net*/*.dll
