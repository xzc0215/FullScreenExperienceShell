name: Build FullScreenExperienceShell

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore FullScreenExperienceShell.slnx

    - name: Build project
      run: msbuild FullScreenExperienceShell.slnx /p:Configuration=Release /p:Platform="Any CPU"
