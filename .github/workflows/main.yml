name: Build FullScreenExperienceShell

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        # 该项目为 Windows Shell 项目，通常需要较新的 .NET SDK
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore FullScreenExperienceShell.slnx

    - name: Build project
      # 移除硬编码的配置参数，让 dotnet 自动识别解决方案中的默认设置
      run: dotnet build FullScreenExperienceShell.slnx --configuration Release --no-restore

    - name: Upload Build Artifacts
      # 编译完成后，将生成的 exe 等文件保存为构建产物
      uses: actions/upload-artifact@v4
      with:
        name: FullScreenExperienceShell-Build
        path: |
          **/bin/Release/
          **/bin/x64/Release/
