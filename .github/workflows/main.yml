name: Build FullScreenExperienceShell

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore FullScreenExperienceShell.slnx

    - name: Build project
      # 已修复：改为 PowerShell 兼容的单行格式
      run: dotnet build FullScreenExperienceShell.slnx --configuration Release -p:PublishReadyToRun=false --no-restore

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FullScreenExperienceShell-Binaries
        path: |
          **/bin/Release/net*/*.exe
          **/bin/Release/net*/*.dll
