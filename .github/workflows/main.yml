name: Build FullScreenExperienceShell

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # 你的项目使用了 net10.0，请确保环境匹配

    - name: Restore dependencies
      run: dotnet restore FullScreenExperienceShell.slnx -p:Platform=x64

    - name: Publish MSIX Package
      # 对于 WinUI 3 MSIX 项目，必须执行 publish 才能生成安装包
      # --self-contained true 确保所有依赖都被打包
      run: >
        dotnet publish FullScreenExperienceShell/FullScreenExperienceShell.csproj 
        -c Release 
        -r win-x64 
        --self-contained true 
        -p:PublishReadyToRun=true 
        -p:GenerateAppxPackageOnBuild=true 
        -p:AppxPackageDir=AppPackages

    - name: Upload MSIX Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FullScreenExperienceShell-MSIX
        path: FullScreenExperienceShell/AppPackages/**/*.msix
