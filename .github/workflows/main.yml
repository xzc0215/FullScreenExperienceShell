name: Build FullScreenExperienceShell

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore FullScreenExperienceShell.slnx

    - name: Build project
      run: dotnet build FullScreenExperienceShell.slnx --configuration Release -p:PublishReadyToRun=false --no-restore

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FullScreenExperienceShell-Binaries
        # 這裡擴展了搜尋範圍，包含整個 bin 目錄結構，確保不會遺漏
        path: |
          **/bin/**/*
