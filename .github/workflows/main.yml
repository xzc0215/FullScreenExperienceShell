name: Build FullScreenExperienceShell

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore FullScreenExperienceShell.slnx -p:Platform=x64

    - name: Build and Publish
      # 為了繞過 MSIX 簽名錯誤導致的丟失，我們嘗試執行 Build 並輸出到特定目錄
      # 這會產生可直接運行的檔案結構，而不需要打包成 MSIX
      run: >
        dotnet publish FullScreenExperienceShell/FullScreenExperienceShell.csproj 
        -c Release 
        -r win-x64 
        --no-self-contained 
        -p:PublishReadyToRun=false 
        -p:GenerateAppxPackageOnBuild=false
        -o ./publish_output

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FullScreenExperienceShell-Output
        path: ./publish_output/
